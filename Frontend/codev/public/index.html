<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEVROOM | Code Together</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #1a1a2e;
      --secondary: #16213e;
      --accent: #0f3460;
      --highlight: #e94560;
      --text: #ffffff;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text);
      overflow: hidden;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 3rem;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      border: 2px solid var(--highlight);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      max-width: 500px;
      width: 90%;
    }

    .logo {
      font-size: 4rem;
      margin-bottom: 1rem;
      color: var(--highlight);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }

    .tagline {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      opacity: 0.9;
    }

    .btn-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      color: white;
      padding: 1rem 2rem;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 2px solid transparent;
    }

    .btn-primary {
      background: var(--highlight);
    }

    .btn-secondary {
      background: var(--accent);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .features {
      display: flex;
      justify-content: space-around;
      margin-top: 2rem;
      gap: 1rem;
    }

    .feature {
      text-align: center;
      padding: 1rem;
    }

    .feature i {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: var(--highlight);
    }

    @media (max-width: 768px) {
      .container {
        padding: 2rem;
      }
      
      h1 {
        font-size: 2rem;
      }
      
      .btn-group {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <i class="fas fa-laptop-code"></i>
    </div>
    
    <h1>DEVROOM</h1>
    
    <p class="tagline">
      Where Developers Connect, Collaborate & Create
    </p>
    
    <div class="btn-group">
      <a href="register.html" class="btn btn-primary">
        <i class="fas fa-rocket"></i>
        Get Started
      </a>
      <a href="login.html" class="btn btn-secondary">
        <i class="fas fa-sign-in-alt"></i>
        Sign In
      </a>
    </div>

    <div class="features">
      <div class="feature">
        <i class="fas fa-users"></i>
        <div>Live Collaboration</div>
      </div>
      <div class="feature">
        <i class="fas fa-code"></i>
        <div>Real-time Coding</div>
      </div>
      <div class="feature">
        <i class="fas fa-comments"></i>
        <div>Instant Chat</div>
      </div>
    </div>
  </div>
</body>
</html>
