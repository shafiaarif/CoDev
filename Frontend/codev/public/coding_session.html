<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEVROOM | Coding Session</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<style>
:root { --primary:#1a1a2e; --secondary:#16213e; --accent:#0f3460; --highlight:#e94560; --text:#fff;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:var(--primary);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

.header{padding:1rem 2rem;background:rgba(26,37,48,0.9);border-bottom:3px solid var(--highlight);display:flex;justify-content:space-between;align-items:center;}
.session-info h1{font-size:1.6rem;}
.connection-status{display:flex;align-items:center;gap:0.6rem;font-weight:600;}
.user-controls{display:flex;gap:1rem;align-items:center;}
.role-badge{background:var(--accent);padding:0.5rem 1rem;border-radius:20px;font-weight:600;}
.instructor-badge{background:var(--highlight);}
.btn{padding:0.6rem 1.2rem;border-radius:8px;cursor:pointer;font-weight:600;}
.leave-btn{background:transparent;border:2px solid var(--highlight);color:white;}
.end-btn{background:var(--highlight);border:none;color:white;}

.main{flex:1;display:grid;grid-template-columns:3fr 1fr;}
.editor-panel{background:#1e1e1e;display:flex;flex-direction:column;}
.toolbar{padding:1rem;background:#252526;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #444;}
.toolbar-group{display:flex;gap:1rem;align-items:center;}
select,.toolbar-btn{padding:0.6rem 1rem;background:#3c3c3c;border:1px solid #555;border-radius:6px;color:white;cursor:pointer;}
.file-btn{background:var(--accent);color:white;border:none;cursor:pointer;}
#editor{flex:1;}
.output{height:220px;background:#1e1e1e;border-top:1px solid #444;padding:1rem;color:#00ff00;font-family:monospace;overflow:auto;white-space:pre-wrap;}

.sidebar{background:rgba(26,37,48,0.95);border-left:1px solid var(--accent);display:flex;flex-direction:column;}
.sidebar-section{padding:1rem;border-bottom:1px solid var(--accent);}
.sidebar-section h3{margin-bottom:0.8rem;color:var(--highlight);}
.participant{display:flex;align-items:center;gap:0.8rem;padding:0.6rem;background:rgba(255,255,255,0.05);margin:0.4rem 0;border-radius:8px;justify-content:space-between;}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--highlight);display:flex;align-items:center;justify-content:center;font-weight:bold;}
.chat-messages{flex:1;padding:1rem;overflow-y:auto;display:flex;flex-direction:column;gap:0.8rem;}
.message{max-width:85%;padding:0.8rem;border-radius:12px;background:rgba(255,255,255,0.1);}
.message.own{align-self:flex-end;background:#0f3460;}
.sender{font-weight:600;color:var(--highlight);margin-bottom:0.3rem;}
.chat-input{display:flex;padding:1rem;background:#2d2d2d;}
#chatInput{flex:1;padding:0.9rem;background:rgba(255,255,255,0.1);border:1px solid var(--accent);border-radius:8px;color:white;}
#sendBtn{background:var(--highlight);border:none;margin-left:0.5rem;padding:0 1.5rem;border-radius:8px;cursor:pointer;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--highlight);color:white;padding:1rem 2rem;border-radius:50px;z-index:10000;opacity:0;transition:0.4s;}
.participant button{background:var(--highlight);border:none;padding:0.3rem 0.6rem;border-radius:5px;color:white;cursor:pointer;} </style>

</head>
<body>
<div class="header">
<div class="session-info"><h1 id="sessionTitle">Loading...</h1></div>
<div class="connection-status" id="connectionStatus"><i class="fas fa-circle"></i> Connecting...</div>
<div class="user-controls">
<div class="role-badge" id="roleBadge">STUDENT</div>
<button class="btn leave-btn" id="controlBtn">Leave Session</button>
</div>
</div>

<div class="main">
<div class="editor-panel">
<div class="toolbar">
<div class="toolbar-group">
<select id="langSelect">
<option value="python">Python</option>
<option value="c">C</option>
</select>
<button class="toolbar-btn" id="runBtn">Run Code</button>
<button class="toolbar-btn" id="downloadBtn">Download</button>
<button class="toolbar-btn" id="saveBtn">Save Session</button>
</div>
<div class="toolbar-group">
<label class="file-btn">Upload File<input type="file" id="fileInput" accept=".py,.c" style="display:none"></label>
</div>
</div>
<div id="editor"></div>
<div class="output" id="output">Output will appear here...</div>
</div>

<div class="sidebar">
<div class="sidebar-section">
<h3>Participants (<span id="onlineCount">0</span>)</h3>
<div id="participantsList"></div>
</div>
<div class="sidebar-section" style="flex:1">
<h3>Chat</h3>
<div class="chat-messages" id="chatMessages"></div>
<div class="chat-input">
<input type="text" id="chatInput" placeholder="Type a message...">
<button id="sendBtn">Send</button>
</div>
</div>
</div>
</div>

<div class="toast" id="toast">Message</div>

<script>
const token = localStorage.getItem('token');
if(!token){alert('Login required');location.href='login.html';}

const urlParams = new URLSearchParams(location.search);
const roomId = urlParams.get('session');
const role = urlParams.get('role')||'student';
const isInstructor = role==='instructor';
let editor, socket, participants = [];

function showToast(msg){
  const t = document.getElementById('toast'); t.textContent=msg; t.style.opacity=1; setTimeout(()=>t.style.opacity=0,3000);
}

function fetchParticipants(){
  fetch(`http://localhost:8000/api/rooms/participants/${roomId}`,{headers:{'Authorization':`Bearer ${token}`}})
  .then(r=>r.json()).then(data=>{
    if(data.success){
      participants=data.participants;
      const list=document.getElementById('participantsList'); list.innerHTML='';
      document.getElementById('onlineCount').textContent=participants.length;
      participants.forEach(p=>{
        const div=document.createElement('div'); div.className='participant';
        div.innerHTML=`<div class="avatar">${p.username[0]}</div>${p.username}`;
        if(isInstructor && p._id!==localStorage.getItem('userId')){
          const btn=document.createElement('button'); btn.textContent='Kick';
          btn.onclick=()=>kickStudent(p._id); div.appendChild(btn);
        }
        list.appendChild(div);
      });
    }
  });
}

function kickStudent(studentId){
  fetch(`http://localhost:8000/api/rooms/kick/${roomId}`,{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
    body:JSON.stringify({studentId})
  }).then(r=>r.json()).then(data=>{if(data.success) showToast(data.message); fetchParticipants();});
}

// Socket.IO
socket = io('http://localhost:8000',{auth:{token},transports:['websocket','polling']});
socket.on('connect',()=>{
  document.getElementById('connectionStatus').innerHTML='<i class="fas fa-circle" style="color:#2ecc71"></i> Connected';
  socket.emit('joinRoom',{roomId,role,username:localStorage.getItem('username')||'User'});
  fetchParticipants();
});
socket.on('connect_error', err=>{document.getElementById('connectionStatus').innerHTML='<i class="fas fa-circle" style="color:#e74c3c"></i> Connection Failed'; console.log(err.message)});
socket.on('userJoined', u=>{showToast(`${u.username} joined`); fetchParticipants();});
socket.on('admitResponse', data=>{showToast(`Your request was ${data.action}`); if(data.action==='approve') fetchParticipants();});
socket.on('studentKicked', data=>{if(data.studentId===localStorage.getItem('userId')) {alert('You have been kicked'); location.href='dashboard.html';} fetchParticipants();});
socket.on('sessionEnded', ()=>{alert('Session ended by instructor'); location.href=isInstructor?'instructor_dashboard.html':'dashboard.html';});
socket.on('chatMessage', msg=>addMessage(msg.username,msg.text,msg.isOwn));

// Chat
function addMessage(sender,text,isOwn=false){
  const div=document.createElement('div'); div.className='message'+(isOwn?' own':''); div.innerHTML=`<div class="sender">${sender}</div><div>${text}</div>`;
  const chat=document.getElementById('chatMessages'); chat.appendChild(div); div.scrollIntoView({behavior:'smooth'});
}
function sendChatMessage(){
  const input=document.getElementById('chatInput'); const text=input.value.trim();
  if(text){
    socket.emit('chatMessage',{roomId,text});
    fetch('http://localhost:8000/api/rooms/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({roomId,username:localStorage.getItem('username'),message:text})});
    input.value='';
  }
}
document.getElementById('sendBtn').onclick=sendChatMessage;
document.getElementById('chatInput').addEventListener('keypress',e=>{if(e.key==='Enter') sendChatMessage();});

// Monaco Editor
require.config({ paths:{'vs':'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs'}});
require(['vs/editor/editor.main'],()=>{
  editor = monaco.editor.create(document.getElementById('editor'),{
    value:'# Welcome to DEVROOM\n','language':'python','theme':'vs-dark','fontSize':15,automaticLayout:true
  });
  editor.onDidChangeModelContent(()=>{
    const code = editor.getValue(); const lang=document.getElementById('langSelect').value;
    socket.emit('codeChange',{roomId,code,language:lang});
  });
  socket.on('codeUpdate',data=>{
    if(editor.getValue()!==data.code){
      editor.setValue(data.code);
      monaco.editor.setModelLanguage(editor.getModel(),data.language);
    }
  });
});

// UI Init
document.getElementById('sessionTitle').textContent=`Session: ${roomId||'Free'}`;
document.getElementById('roleBadge').textContent=role.toUpperCase();
if(isInstructor){
  document.getElementById('roleBadge').classList.add('instructor-badge');
  document.getElementById('controlBtn').textContent='End Session';
  document.getElementById('controlBtn').onclick=endSession;
}else{
  document.getElementById('controlBtn').onclick=leaveSession;
}

// File Upload
// File Upload
document.getElementById('fileInput').addEventListener('change', () => {
    const file = document.getElementById('fileInput').files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = e => {
        // Only set editor content if you want to load file
        editor.setValue(e.target.result);
    };
    reader.readAsText(file);
});

// Download
document.getElementById('downloadBtn').onclick = () => {
    const code = editor.getValue(); // keep editor content intact
    const lang = document.getElementById('langSelect').value;

    fetch('http://localhost:8000/api/rooms/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ code, language: lang })
    })
    .then(r => r.blob())
    .then(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `code.${lang === 'python' ? 'py' : 'c'}`;
        a.click();
        URL.revokeObjectURL(url); // release memory
    });
};

// Save Session Code
document.getElementById('saveBtn').onclick=()=>{
  const code=editor.getValue(); const lang=document.getElementById('langSelect').value;
  fetch(`http://localhost:8000/api/rooms/save-code/${roomId}`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({code,language:lang})})
  .then(r=>r.json()).then(data=>{if(data.success) showToast('Code saved'); else showToast(data.message);});
};

// Run Code (simple client-side for now, replace with backend execution API)
document.getElementById('runBtn').onclick=async()=>{
  const code=editor.getValue(); const lang=document.getElementById('langSelect').value;
  const res=await fetch(`http://localhost:8000/api/rooms/run`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({code,language:lang})});
  const out=await res.json(); document.getElementById('output').textContent=out.output||out.error||'No output';
};

// Leave/End Session
function leaveSession(){if(confirm('Leave session?')) location.href='dashboard.html';}
function endSession(){fetch(`http://localhost:8000/api/rooms/end/${roomId}`,{method:'POST',headers:{'Authorization':`Bearer ${token}`}})
.then(r=>r.json()).then(data=>{if(data.success) location.href='instructor_dashboard.html'; else showToast(data.message);});}
</script>

</body>
</html>
